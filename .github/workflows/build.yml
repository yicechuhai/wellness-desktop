name: Build Wellness Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Visual Studio C++ build tools required by better-sqlite3 native addon
      - name: Install Visual Studio build tools
        run: |
          choco install visualstudio2022-workload-vctools -y --no-progress
        shell: cmd

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build portable exe
        run: npx electron-builder --win portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build setup exe
        run: npx electron-builder --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wellness-desktop-v${{ github.run_number }}
          path: release/
