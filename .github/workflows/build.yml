name: Build Wellness Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Create release package
        run: |
          mkdir -p release/wellness-desktop
          cp -r backend release/wellness-desktop/
          cp -r frontend release/wellness-desktop/
          cp start.cjs release/wellness-desktop/
          cp start.bat release/wellness-desktop/
          cp main.js release/wellness-desktop/
          cp preload.js release/wellness-desktop/
          cp package.json release/wellness-desktop/
          cp README.md release/wellness-desktop/
          cd release && zip -r ../wellness-desktop-v2.0.0.zip wellness-desktop

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v2.0.0
          name: "Wellness Desktop v2.0.0"
          body: |
            ## v2.0.0 Major Upgrade

            ### New Features
            - Role-based access control (Admin/Manager/Therapist/Reception)
            - Login system with JWT authentication
            - User management admin panel
            - Excel export for all data tables
            - Button-level permission controls

            ### Default Accounts
            - admin / admin123
            - manager / admin123
            - front / admin123

            ### Installation
            1. Download and extract the ZIP
            2. Run `npm install`
            3. Run `npm start`
          files: wellness-desktop-v2.0.0.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
