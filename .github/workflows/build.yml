name: Build Wellness Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # windows-2022 has VS 2022 pre-installed, need to configure npm for native modules
      - name: Configure npm for native compilation
        run: |
          npm config set msvs_version 2022
          echo "npm config set: msvs_version=2022"
        shell: bash

      - name: Install dependencies
        run: npm install --build-from-source
        env:
          npm_config_msvs_version: 2022

      - name: Build frontend
        run: npm run build

      - name: Build portable exe
        run: npx electron-builder --win portable --config.extraMetadata.main=main.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build setup exe
        run: npx electron-builder --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wellness-desktop
          path: release/
